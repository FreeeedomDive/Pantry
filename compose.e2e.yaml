services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pantry_e2e
      POSTGRES_USER: pantry_e2e
      POSTGRES_PASSWORD: pantry_e2e
    ports:
      - "55433:5432"
    volumes:
      - pantry_e2e_postgresql:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pantry_e2e -d pantry_e2e"]
      interval: 2s
      timeout: 5s
      retries: 15

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: pantry_e2e
      RABBITMQ_DEFAULT_PASS: pantry_e2e
    ports:
      - "55673:5672"
      - "15673:15672"
    volumes:
      - pantry_e2e_rabbitmq:/var/lib/rabbitmq/mnesia
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 2s
      timeout: 5s
      retries: 15

  nginx:
    image: nginx:alpine
    ports:
      - "8089:80"
    volumes:
      - ./nginx/nginx.e2e.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pantry_e2e_postgresql:
  pantry_e2e_rabbitmq:
