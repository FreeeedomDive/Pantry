spring:
  application:
    name: pantry
  threads:
    virtual:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: false
  rabbitmq:
    listener:
      simple:
        concurrency: 1
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 3s
          max-retries: 3
