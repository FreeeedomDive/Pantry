name: Master Push

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  check-hotfix:
    name: Check for Hotfix
    runs-on: ubuntu-latest
    outputs:
      is_hotfix: ${{ steps.check.outputs.is_hotfix }}
    steps:
      - name: Check commit message for hotfix
        id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if echo "$COMMIT_MSG" | grep -qi "hotfix"; then
            echo "is_hotfix=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_hotfix=false" >> "$GITHUB_OUTPUT"
          fi

  run-checks:
    name: Run Checks
    needs: check-hotfix
    if: needs.check-hotfix.outputs.is_hotfix != 'true'
    uses: ./.github/workflows/Checks.yml

  deploy:
    name: Deploy
    needs: run-checks
    if: ${{ !failure() && !cancelled() }}
    uses: ./.github/workflows/MasterDeployment.yml
    secrets: inherit
