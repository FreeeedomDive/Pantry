name: E2E

on:
  workflow_call:
  workflow_dispatch:

jobs:
  e2e:
    name: Browser E2E suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "24"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check E2E tests
        working-directory: frontend
        run: npm run e2e:typecheck

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run browser E2E suite
        run: ./scripts/run-e2e.sh

      - name: Ensure E2E dependencies are removed
        if: ${{ always() }}
        run: docker compose --project-name pantry-e2e --file compose.e2e.yaml down --volumes --remove-orphans

      - name: Upload browser diagnostics
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: pantry-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            frontend/playwright-report/
            frontend/test-results/
          if-no-files-found: warn
          retention-days: 14
