name: Checks

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    branches:
      - master

jobs:
  detect-changes:
    name: Detect Changes
    uses: ./.github/workflows/DetectChanges.yml

  tests:
    name: Backend Tests
    needs: [detect-changes]
    if: ${{ needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.migrate == 'true' }}
    uses: ./.github/workflows/Tests.yml

  lint:
    name: Frontend Lint
    needs: [detect-changes]
    if: ${{ needs.detect-changes.outputs.frontend == 'true' }}
    uses: ./.github/workflows/Lint.yml

  gate:
    name: Checks Passed
    needs: [detect-changes, tests, lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any check failed or was cancelled
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
