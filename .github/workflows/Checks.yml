name: Checks

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]
    branches:
      - master

jobs:
  detect-changes:
    name: Detect Changes
    if: ${{ github.event.label.name == 'run-checks' }}
    uses: ./.github/workflows/DetectChanges.yml
    with:
      base-ref: master

  tests:
    name: Backend Tests
    needs: [detect-changes]
    if: ${{ !cancelled() && (github.event_name == 'workflow_dispatch' || (github.event.label.name == 'run-checks' && (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.migrate == 'true'))) }}
    uses: ./.github/workflows/Tests.yml

  lint:
    name: Frontend Lint
    needs: [detect-changes]
    if: ${{ !cancelled() && (github.event_name == 'workflow_dispatch' || (github.event.label.name == 'run-checks' && needs.detect-changes.outputs.frontend == 'true')) }}
    uses: ./.github/workflows/Lint.yml

  gate:
    name: Checks Passed
    needs: [detect-changes, tests, lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail unless run-checks passed, hotfix, or manual run
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || (github.event_name == 'pull_request' && github.event.label.name != 'run-checks' && github.event.label.name != 'hotfix') }}
        run: exit 1
